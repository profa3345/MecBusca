<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>Sem conexão — MecBusca</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --accent: #e63946;
      --text: #f1f1f1;
      --muted: #8a8a9a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }
    h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      color: var(--muted);
      font-size: 1rem;
      max-width: 36ch;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .brand {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Você está offline</h1>
  <p>Verifique sua conexão com a internet e tente novamente.</p>
  <button class="btn" onclick="location.reload()">Tentar novamente</button>
  <span class="brand">MecBusca — mecbusca.com.br</span>
</body>
</html>
